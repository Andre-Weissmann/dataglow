# ============================================================
# DATAGLOW — CI job: Source Convergence ingestion adapters (Truth Network, Batch 2)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind the Source Convergence ingestion adapters
# (js/validation/source-convergence-ingestion.js): adaptExcelWorkbook() (one
# source per sheet/tab), adaptApiSource()/adaptSiteExport() (defensive JSON
# unwrapping + provenance), inferJoinKeys() (shared key heuristic),
# assignDefaultTrust(), toEngineSources(), the never-throws edge cases, and the
# end-to-end test that feeds adapter output straight through Batch 1's
# buildConvergenceGraph. The module consumes already-parsed data with no
# DOM/XLSX/network, so plain `node` runs the suite — same shape as the Batch 1
# Source Convergence job.

name: Source Convergence ingestion (Truth Network B2)

on:
  workflow_call:

jobs:
  source-convergence-ingestion:
    name: Source Convergence ingestion (Excel/API/site adapters + engine-compatibility contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergenceingestion
