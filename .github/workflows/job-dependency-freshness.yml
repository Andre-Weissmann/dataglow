# ============================================================
# DATAGLOW — CI job: Dependency freshness ledger
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).

name: Dependency freshness ledger

on:
  workflow_call:

jobs:
  dependency-freshness:
    name: Dependency freshness ledger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Dependency Freshness Ledger: reads package.json + package-lock.json,
      # queries the npm registry (`npm outdated --json`) and known-vulnerability
      # data (`npm audit --json`), and regenerates docs/dependency-freshness-ledger.md.
      # FAILS the build if any dependency is more than 2 majors behind latest, or
      # if npm audit reports a high/critical advisory; minor/patch staleness only
      # warns. A network blip talking to the registry warns but does not fail.
      - run: npm run test:deps-freshness
