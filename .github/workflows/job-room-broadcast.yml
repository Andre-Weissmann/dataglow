# ============================================================
# DATAGLOW — CI job: Room Broadcast (DataGlow Rooms, Batch 2)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind DataGlow Rooms' Object Space broadcast wiring
# (js/rooms/room-broadcast.js):
#   - buildEntryMessage() / buildViewingMessage() wire-message shaping (shape
#     metadata only, never raw rows),
#   - RoomBroadcastCoordinator.broadcastEntry()/broadcastViewing() — sends to
#     peers only when a Room is active, a strict no-op otherwise,
#   - receive() routing + newest-write-wins Object Space application and the
#     read-only "who's viewing" peer→object map,
#   - per-peer / whole-transport degradation (never throws), all against an
#     injected fake data-channel transport (mirrors RoomSignalingCoordinator's
#     and FederatedCoordinator's own test style).
# The module is pure JS with dependency-injected adapters (no real WebRTC/
# network exercised in CI, same as room-signaling.test.mjs), so plain `node`
# runs the suite — no DuckDB, DOM, or browser needed.

name: Room Broadcast (Rooms B2)

on:
  workflow_call:

jobs:
  room-broadcast:
    name: Room Broadcast (Object Space broadcast + who's-viewing contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomsbroadcast
