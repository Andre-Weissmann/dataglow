# ============================================================
# DATAGLOW — CI job: Source Convergence (Truth Network, Batch 1)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind Source Convergence
# (js/validation/source-convergence.js): buildConvergenceGraph() (N-way join
# graph with transitive reachability), computeConvergenceClusters() (same-entity
# clusters + coverage pattern + per-column agree/conflict analysis),
# resolveClusterWithTrust() (trust-margin resolution with honest escalation), and
# summarizeConvergence(), plus the never-throws edge cases. The module is pure JS
# with no DOM/DuckDB/network, so plain `node` runs the suite — same shape as the
# Room Signaling (Rooms Batch 1) job.

name: Source Convergence (Truth Network B1)

on:
  workflow_call:

jobs:
  source-convergence:
    name: Source Convergence (N-way join graph + trust-margin resolution contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergence
