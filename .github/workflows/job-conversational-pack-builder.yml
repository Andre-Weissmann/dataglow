# ============================================================
# DATAGLOW — CI job: Conversational pack builder (Gen 42)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the four pure-logic suites behind the guided conversational pack builder:
#   - Data-grounded question generator: asserts every generated question echoes a
#     REAL observed value (never a generic prompt) and honours the askability
#     priority order.
#   - "I don't know" resolution engine: asserts Steps A→D run in order, the three
#     debate agents run SEQUENTIALLY under the 2-second budget (fallback when
#     blown), Step E parks-and-revisits, and the resolution path makes zero
#     network calls (reuses the pack no-network guard's static scan + runtime trap).
#   - Local peer-sourced pack index: asserts read-only content-addressed lookup,
#     an injected fetcher that degrades to an empty index offline, and zero
#     network primitives in source.
#   - Guided pack builder: asserts confirmed answers (button/typed/voice/resolver)
#     build a valid portable pack that passes the existing community-pack schema
#     validator and the no-network guard, across five sample sessions.
# All four modules are pure JS (LLM-injected, browser-free), so no DuckDB, DOM, or
# network is needed — plain `node` runs each suite.

name: Conversational pack builder (Gen 42)

on:
  workflow_call:

jobs:
  conversational-pack-builder:
    name: Conversational pack builder (question-gen + resolver + index + builder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:questiongen
      - run: npm run test:uncertainty
      - run: npm run test:packindex
      - run: npm run test:packbuilder
