# ============================================================
# DATAGLOW — CI job batch 02 (consolidated)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# CONSOLIDATION NOTE (2026-07-17): GitHub caps a single caller workflow file
# at 50 UNIQUE reusable workflows in its call tree (confirmed via GitHub Docs:
# https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations
# — nesting into intermediate "batch" reusable workflows does NOT free
# headroom, since every workflow in the tree still counts individually).
# The real, GitHub-documented fix is that a single file's `jobs:` block can
# define many named jobs with zero contribution to that 50-workflow limit —
# only `uses:` calls to SEPARATE files count. This file groups several
# previously-separate one-job-per-file reusable workflows into one file with
# multiple jobs, each still running independently in its own runner, with
# IDENTICAL job names/ids and IDENTICAL steps as before (pure structural
# consolidation, zero behavior change). The individual per-job files this
# batch replaces:
#   - job-context-engine.yml -> job: context-engine
#   - job-conversational-pack-builder.yml -> job: conversational-pack-builder
#   - job-crucible.yml -> job: crucible
#   - job-data-nutrition-label.yml -> job: data-nutrition-label
#   - job-databricks-connect.yml -> job: databricks-connect
#   - job-dependency-freshness.yml -> job: dependency-freshness
#   - job-dialect-adapter.yml -> job: dialect-adapter
#   - job-export-reporting.yml -> job: export-reporting
#   - job-golden-regression.yml -> job: golden-regression
#   - job-incident-postmortem.yml -> job: incident-postmortem
#
# To add a NEW job going forward: prefer adding a job block to whichever
# job-ci-batch-*.yml file has spare room, rather than creating a new
# job-<name>.yml + a new `uses:` line in test.yml. See the DataGlow CI
# Architect note in test.yml's header for the standing guardrail.

name: CI batch 02

on:
  workflow_call:

jobs:
  context-engine:
    name: Context Engine (micro-lessons + community packs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:microlessons
      - run: npm run test:communitypack

  conversational-pack-builder:
    name: Conversational pack builder (question-gen + resolver + index + builder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:questiongen
      - run: npm run test:uncertainty
      - run: npm run test:packindex
      - run: npm run test:packbuilder

  crucible:
    name: The Crucible (typed handoff contract + adversarial packs + read-only UI + revert proposals + orchestration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:cruciblecontract
      - run: npm run test:cruciblepacks
      - run: npm run test:crucibleui
      - run: npm run test:reverteligibility
      - run: npm run test:crucibleorchestration

  data-nutrition-label:
    name: Data Nutrition Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:nutritionlabel

  databricks-connect:
    name: Databricks Direct-Connect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Databricks Direct-Connect: unit suite for the optional BYO-token,
      # browser-direct, read-only warehouse pull. Exercises request/URL
      # construction, the submit → poll → succeed path, reuse of the injected
      # loadRows ingest seam, HTTP/failure-state error phrasing, and the
      # read-only/in-memory-only/never-stored credential contract — all with
      # fetch stubbed (no live Databricks workspace or token in CI).
      - run: npm run test:databricks

  dependency-freshness:
    name: Dependency freshness ledger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Dependency Freshness Ledger: reads package.json + package-lock.json,
      # queries the npm registry (`npm outdated --json`) and known-vulnerability
      # data (`npm audit --json`), and regenerates docs/dependency-freshness-ledger.md.
      # FAILS the build if any dependency is more than 2 majors behind latest, or
      # if npm audit reports a high/critical advisory; minor/patch staleness only
      # warns. A network blip talking to the registry warns but does not fail.
      - run: npm run test:deps-freshness

  dialect-adapter:
    name: Multi-dialect SQL adapter (Polyglot Workbench Batch A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:dialectadapter

  export-reporting:
    name: Export / reporting layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:export

  golden-regression:
    name: Golden regression suite (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Golden Regression Suite: re-runs DATAGLOW's core deterministic
      # operations (SQL-generating cleaners, the full validation-layer
      # orchestrator, cross-column / bounds checkers, and the calibrated-grade
      # roll-up) and diffs their output against versioned fixtures in
      # test/golden/fixtures/. A failure means a change moved an existing
      # output — intended or not. If intended, regenerate with
      # `npm run test:golden:update` and review the fixture diff in the PR.
      - run: npm run test:golden

  incident-postmortem:
    name: Blameless Incident Postmortem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:postmortem
