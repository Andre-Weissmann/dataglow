# ============================================================
# DATAGLOW — CI job: Provenance Packet (Batch 1 + Batch 2)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Unit-tests all four Provenance Packet Batch 1 + Batch 2 features, all pure
# Node (no browser, no DuckDB, no network). Consolidated into one job
# (2026-07-14) to stay under GitHub Actions' 50-reusable-workflow-job cap —
# see docs/tech-debt-tracker.md for the full rationale. No test coverage was
# removed; all four suites still run in full as separate steps.
#
# Batch 1:
#   - Cell-level Data Blame (js/provenance/data-blame.js) — the per-column /
#     per-cell transform-history reader over the existing chain-of-custody trail.
#   - De-identification Verifier (js/provenance/deidentification-verifier.js) —
#     the 18 HIPAA Safe Harbor categories, the re-identification risk score, and
#     the SHA-256-signed attestation + its verifier (exercised end-to-end via the
#     DuckDB wrapper against a fake engine).
# Batch 2:
#   - Denial Root-Cause Profiler (js/provenance/denial-root-cause.js) — the
#     schema-tolerant claims-denial risk bucketer + its SHA-256-signed
#     attestation (exercised end-to-end via the DuckDB wrapper against a fake
#     engine).
#   - Cost-of-bad-data quantifier (js/provenance/cost-of-bad-data.js) — the
#     transparent flagged-rows × editable per-error-cost estimate.
#
# Also added (2026-07-16), same consolidation rationale:
#   - Self-Issued Skills Credential (scripts/self-issued-skills-credential.mjs)
#     — a standalone dev-tooling script (not a shipped app feature) that
#     reuses selective-disclosure-proof.js's own Merkle commitment/selective-
#     disclosure primitives to produce a tamper-evident, independently
#     re-verifiable credential of maintainer activity claims (commit counts,
#     merged PRs, CI status, test/CI surface size) pulled live from git/gh.
#     The test here exercises the same underlying primitives with a
#     synthetic, deterministic claim set (not live repo state, so the test
#     itself never flakes as commit counts change) — see
#     test/self-issued-skills-credential.test.mjs for the full rationale on
#     why this reuses selective disclosure rather than the separate
#     zk-threshold-proof.js module.
# See test/data-blame.test.mjs, test/deidentification-verifier.test.mjs,
# test/denial-root-cause.test.mjs, test/cost-of-bad-data.test.mjs, and
# test/self-issued-skills-credential.test.mjs.

name: Provenance Packet

on:
  workflow_call:

jobs:
  provenance-packet:
    name: Provenance Packet (Batch 1 + Batch 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:datablame
      - run: npm run test:deidverify
      - run: npm run test:denialprofile
      - run: npm run test:costofbaddata
      - run: npm run test:skillscredential
