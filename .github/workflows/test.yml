  agents-md-drift:
    uses: ./.github/workflows/job-agents-md-drift.yml

  # NEW-JOB-ENTRIES-BELOW: append new "uses:" job blocks directly under this line, do not edit existing entries above
  source-convergence-ui:
    uses: ./.github/workflows/job-source-convergence-ui.yml
  source-convergence-ingestion:
    uses: ./.github/workflows/job-source-convergence-ingestion.yml
  source-convergence:
