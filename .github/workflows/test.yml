# ============================================================
# DATAGLOW — Continuous Integration (thin orchestrator)
# ============================================================
# This file used to hold every CI job inline, which meant two PRs each adding a
# job collided on this one YAML file. It is now a THIN ORCHESTRATOR: every job
# lives in its own standalone reusable workflow (each triggered via
# `on: workflow_call`), and each entry below is a one-line `uses:` call into one
# of those files. Adding a CI job is a single appended block under the
# NEW-JOB-ENTRIES-BELOW marker — no edits to existing entries.
#
# The per-job files are named `.github/workflows/job-<name>.yml`. They live at
# the TOP LEVEL of .github/workflows/ (not a subdirectory) because GitHub only
# resolves reusable workflows referenced from the top level of that directory —
# a `jobs/` subdirectory fails with "workflows must be defined at the top level
# of the .github/workflows/ directory". The `job-` prefix keeps them grouped and
# distinguishable from this orchestrator and the two standalone scheduled
# workflows. Each is `workflow_call`-only, so none of them triggers a run on its
# own; they execute only when called from here.
#
# To add a job: create .github/workflows/job-<name>.yml as a `workflow_call`
# reusable workflow, then append a `uses:` block below the marker.

name: tests

on:
  push:
    branches: [main]
  pull_request:
  # merge_group lets this suite run as a GitHub merge-queue required check with
  # no config changes needed later; harmless when no merge queue is configured.
  merge_group:

jobs:
  sql-logic:
    uses: ./.github/workflows/job-sql-logic.yml

  databricks-connect:
