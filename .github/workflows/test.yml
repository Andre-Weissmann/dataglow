# ============================================================
# DATAGLOW — Continuous Integration
# ============================================================
# Jobs:
#
#   sql-logic  — Runs the Node-side SQL logic suite against a REAL (native)
#                DuckDB engine. Exercises the exact production SQL-generating
#                modules (imputation, format-fingerprint, validation) with the
#                browser engine transparently swapped for @duckdb/node-api via
#                a loader hook. Fast, deterministic, no browser needed.
#
#   e2e-smoke  — Boots the real app in real Chrome and asserts the DuckDB-WASM
#                engine comes alive and the Validate tab populates.
#                WHY real Chrome (installed via setup-chrome, not the bundled
#                Playwright headless-shell): the WASM + Web Worker + Blob-URL
#                bootstrap that DuckDB-WASM relies on can be blocked in stripped
#                headless-sandbox environments. GitHub Actions with real Chrome
#                is the authoritative "does it actually work in a browser"
#                source of truth — a flaky local headless run is not.

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sql-logic:
    name: SQL logic (native DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sql
      # Cross-Column Logical Consistency Checker: rule detection/firing unit suite.
      - run: npm run test:crosscol
      # Forecast-Based Drift Alerting: Holt's exponential-smoothing math, the
      # min-history gate, trend-aware flagging, and the injected trend-history
      # store wiring that extends Distributional Fingerprint Drift (PR#15).
      - run: npm run test:driftforecast
      # Expected Value Ranges: informational numeric-column trend bands derived
      # from the forecast projections (per-upload trend %, within/outside-range
      # phrasing, numeric-only scope, graceful fallback, no status change).
      - run: npm run test:expectedrange
      # Gen 9 Batch 1: Domain Physics Engine unit suite + provenance attestation verifier.
      - run: npm run test:physics
      - run: npm run test:attestation
      # Upper-Bound Sanity Anchor: logical/definitional bounds detection + runner.
      - run: npm run test:upperbound
      # Missingness Detective: MCAR/MAR/MNAR causal-missingness classification.
      - run: npm run test:missingness
      # Predictive Anomaly Scoring: holistic kNN/Gower mixed-type outlier score,
      # feature attribution, feature selection, and the size-guard/sampling path.
      - run: npm run test:predanomaly
      # Self-Learning Validation Rules: labeled-example capture, incremental
      # logistic-regression training, min-examples gating, ranking/explanation,
      # and the opt-in/opt-out/clear persistence contract.
      - run: npm run test:selflearn
      # Unified Signal Layer: the shared in-memory signal store (row/column-keyed
      # register/query/lookups + typed clear), the ranker's per-column verdict
      # tally, anomaly suppression when the ranker has learned a dismissal, and
      # drift-flag enrichment with recent rule changes — all additive/no-op-safe.
      - run: npm run test:signalstore
      # Entropy-Reduction Scan (repo-tooling, not a shipped feature): the pure,
      # read-only golden-principles scanner used by the weekly
      # entropy-reduction-scan workflow. This unit test only keeps the scan
      # SCRIPT honest; it does not run the scan as a merge gate.
      - run: npm run test:entropy
      # Dependency Freshness Ledger (repo-tooling, not a shipped feature): the
      # pure staleness/vulnerability scoring core used by the dependency-freshness
      # job below. This network-free unit test only keeps the SCRIPT honest; the
      # actual registry-backed gate runs in its own job.
      - run: npm run test:deps-freshness-unit
      # Adaptive Layer Prioritization: Beta-Binomial/Laplace per-layer scoring,
      # exponential recency decay, the min-actions reorder gate, permutation-safe
      # reordering (never hides a layer), and opt-in/opt-out/clear persistence.
      - run: npm run test:adaptivepriority
      # Federated Fingerprint Learning (opt-in): pairwise-masking secure
      # aggregation cancellation, DP Gaussian clip+noise, min-cohort gating,
      # FedAvg, gossip peer-selection, GitHub-relay fallback, coordination-file
      # rotation, hash-chained receipts, and graceful degradation — all with
      # network/WebRTC/GitHub adapters stubbed (no real network in CI).
      - run: npm run test:federated
      # Fast, deterministic, browser-free unit suites (Gen 9 Batch 2):
      # ambient-validation worker logic + on-device SLM prompt construction.
      - run: npm run test:ambient
      - run: npm run test:slm
      # In-browser Story model: prompt construction + provider/mode selection +
      # generateStory routing/fallback with the WebLLM engine stubbed (no GPU in CI).
      - run: npm run test:storymodel
      # Security regression: Story Engine escapes user-controlled data (stored XSS).
      - run: npm run test:story-xss
      # Gen 10 Batch 2: Digital Twin perturbation → grading pipeline (native DuckDB)
      # and Ambient Watch-Folder change-detection + validation-pipeline reuse.
      - run: npm run test:twin
      - run: npm run test:watch

  databricks-connect:
    name: Databricks Direct-Connect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Databricks Direct-Connect: unit suite for the optional BYO-token,
      # browser-direct, read-only warehouse pull. Exercises request/URL
      # construction, the submit → poll → succeed path, reuse of the injected
      # loadRows ingest seam, HTTP/failure-state error phrasing, and the
      # read-only/in-memory-only/never-stored credential contract — all with
      # fetch stubbed (no live Databricks workspace or token in CI).
      - run: npm run test:databricks

  golden-regression:
    name: Golden regression suite (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Golden Regression Suite: re-runs DATAGLOW's core deterministic
      # operations (SQL-generating cleaners, the full validation-layer
      # orchestrator, cross-column / bounds checkers, and the calibrated-grade
      # roll-up) and diffs their output against versioned fixtures in
      # test/golden/fixtures/. A failure means a change moved an existing
      # output — intended or not. If intended, regenerate with
      # `npm run test:golden:update` and review the fixture diff in the PR.
      - run: npm run test:golden

  dependency-freshness:
    name: Dependency freshness ledger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Dependency Freshness Ledger: reads package.json + package-lock.json,
      # queries the npm registry (`npm outdated --json`) and known-vulnerability
      # data (`npm audit --json`), and regenerates docs/dependency-freshness-ledger.md.
      # FAILS the build if any dependency is more than 2 majors behind latest, or
      # if npm audit reports a high/critical advisory; minor/patch staleness only
      # warns. A network blip talking to the registry warns but does not fail.
      - run: npm run test:deps-freshness

  e2e-smoke:
    name: e2e smoke (real Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install real Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      # Point Playwright at the system Chrome installed above rather than
      # downloading its own headless-shell build.
      - name: Run e2e smoke test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e
      # Gen 9 Batch 2: ambient-validation warnings + on-device SLM graceful
      # degradation (both engine-independent, so robust in headless CI).
      - name: Run ambient + SLM e2e test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-ambient-slm
      # Gen 10 Batch 2: Watch-Folder (driven via the mock-directory test hook, as
      # showDirectoryPicker needs a user gesture) + Digital Twin live simulation,
      # including a network sniffer asserting watched files never leave the device.
      - name: Run watch-folder + digital-twin e2e test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-watch-twin
      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshot
          path: test/e2e-failure.png
          if-no-files-found: ignore
