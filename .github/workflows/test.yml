# ============================================================
# DATAGLOW — Continuous Integration (thin orchestrator)
# ============================================================
# This file used to hold every CI job inline, which meant two PRs each adding a
# job collided on this one YAML file. It is now a THIN ORCHESTRATOR: every job
# lives in its own standalone reusable workflow under .github/workflows/jobs/
# (each triggered via `on: workflow_call`), and each entry below is a one-line
# `uses:` call into one of those files. Adding a CI job is a single appended
# block under the NEW-JOB-ENTRIES-BELOW marker — no edits to existing entries.
#
# To add a job: create .github/workflows/jobs/<name>.yml as a `workflow_call`
# reusable workflow, then append a `uses:` block below the marker.

name: tests

on:
  push:
    branches: [main]
  pull_request:
  # merge_group lets this suite run as a GitHub merge-queue required check with
  # no config changes needed later; harmless when no merge queue is configured.
  merge_group:

jobs:
  sql-logic:
    uses: ./.github/workflows/jobs/sql-logic.yml

  databricks-connect:
    uses: ./.github/workflows/jobs/databricks-connect.yml

  golden-regression:
    uses: ./.github/workflows/jobs/golden-regression.yml

  dependency-freshness:
    uses: ./.github/workflows/jobs/dependency-freshness.yml

  capability-map-drift:
    uses: ./.github/workflows/jobs/capability-map-drift.yml

  supply-chain-hardening:
    uses: ./.github/workflows/jobs/supply-chain-hardening.yml

  agents-md-drift:
    uses: ./.github/workflows/jobs/agents-md-drift.yml

  # NEW-JOB-ENTRIES-BELOW: append new "uses:" job blocks directly under this line, do not edit existing entries above
  e2e-smoke:
    uses: ./.github/workflows/jobs/e2e-smoke.yml
