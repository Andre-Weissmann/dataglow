# ============================================================
# DATAGLOW — CI job: Live Transcript Capture (DataGlow Live Rooms, Batch 1)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind the Meeting Scribe's new live audio-capture +
# on-device speech-to-text input path (js/agents/live-transcript-capture.js):
#   - isSpeechCaptureAvailable() graceful capability check (false, never a throw,
#     unless BOTH a microphone and WebGPU are present),
#   - assembleSegments() / createTranscriptAssembler() turning raw STT chunks
#     (interim vs. final + timestamps) into the SAME {text, ts} segment shape
#     parseTranscriptText produces,
#   - integration with the EXISTING, unchanged tagSegmentsWithContext.
# The module is pure JS (the mic + WebGPU STT wiring is browser-only and lazily
# CDN-loaded), so no DuckDB, DOM, microphone, or network is needed — plain
# `node` runs the suite.

name: Live Transcript Capture (Live Rooms B1)

on:
  workflow_call:

jobs:
  live-transcript-capture:
    name: Live Transcript Capture (capability check + segment assembly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:livecapture
