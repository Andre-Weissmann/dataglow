# ============================================================
# DATAGLOW — CI job: Room transport adapter (DataGlow Rooms, Batch 4)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind the real Rooms signaling + data-channel
# adapters (js/rooms/room-transport-adapter.js):
#   - createGithubRoomSignaling() — the room-code-partitioned GitHub
#     coordination-branch adapter (announcePresence/fetchRoomPeers/leaveRoom),
#     bridging the same pattern createGithubSignaling already runs in
#     production for Federated Learning,
#   - createRoomWebRTCTransport() — the data-channel mesh adapter
#     (send/closeAll) bootstrapped over that same signaling adapter.
# Every external dependency is faked/stubbed in the test file itself (a fake
# `fetch` implementation, a stubbed `RTCPeerConnection`), so plain `node` runs
# the suite — no real network, no browser, no DuckDB.

name: Room Transport Adapter (Rooms B4)

on:
  workflow_call:

jobs:
  room-transport-adapter:
    name: Room Transport Adapter (GitHub signaling + WebRTC mesh, faked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomstransportadapter
