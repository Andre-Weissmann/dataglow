# ============================================================
# DATAGLOW — CI job: Command Deck sidebar nav
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Command Deck, Part 1 (sidebar regroup): pure content-model logic that maps
# the app's 13 real tabs into 5 Trust-Tier Lifecycle Stages for an alternate
# left-sidebar nav. Ships dark behind the `dataglowSidebarNav` flag (off by
# default) — this job only proves the pure logic is correct and stays in
# sync with the real TAB_META in js/app-shell/main.js; it does not exercise
# any live browser rendering (no DOM caller test yet for this batch).

name: Command Deck sidebar nav

on:
  workflow_call:

jobs:
  command-deck:
    name: Command Deck sidebar nav
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Part 1: stage-grouping content model, drift-checked against the real
      # TAB_META block in js/app-shell/main.js so this can never silently
      # fall out of sync with the app's actual 13 tools.
      - run: npm run test:commanddecknav
