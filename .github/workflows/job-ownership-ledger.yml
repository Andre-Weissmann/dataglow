# ============================================================
# DATAGLOW — CI job: Ownership Ledger (DataGlow Passport, Batch D)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Unit-tests the Ownership Ledger (js/provenance/ownership-ledger.js): deriving
# an ordered, append-only list of ownership-relevant events from the EXISTING
# provenance trail + assumption ledger (reading whatever identity is attached
# and NEVER fabricating one — unattributed stays unattributed), the
# recency-weighted current-owner inference that reports "unknown" honestly when
# nothing is attributed, the opt-in append-only explicit-claim path that rejects
# an empty identity and never overwrites a prior claim, the pure content model,
# and a no-network source guard. Pure Node — no browser, no DuckDB, no network.
# See test/ownership-ledger.test.mjs.

name: Ownership Ledger

on:
  workflow_call:

jobs:
  ownership-ledger:
    name: Ownership Ledger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ownershipledger
