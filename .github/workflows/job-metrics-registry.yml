# ============================================================
# DATAGLOW — CI job: Shared metrics registry
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Unit-tests the in-session "define once" shared metrics registry
# (js/app-shell/metrics-registry.js): defineMetric validation (name shape,
# empty/invalid/statement/unbalanced-parens/unterminated-string expressions),
# duplicate-name rejection + overwrite version bump, get/has/list/remove,
# resolveMetricSql (fragment + aliased forms), @metric reference expansion, and
# the optional SHA-256 content fingerprint (which reuses the provenance helper).
# Pure Node — no browser, no DuckDB, no network. See test/metrics-registry.test.mjs.

name: Shared metrics registry

on:
  workflow_call:

jobs:
  metrics-registry:
    name: Shared metrics registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:metricsregistry
