# ============================================================
# DATAGLOW — CI job: Open Floor kernel (Gen 45, Batch A)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind DataGlow Open Floor Batch A:
#   - Read-only room kernel (js/agents/open-floor-room.js): asserts the room is
#     read-only BY CONSTRUCTION (no update/delete/insert/write methods exist at
#     all — not merely disabled), is frozen, delegates reads to the injected
#     engine reader, refuses non-read SQL fail-closed (the refused statement
#     never reaches the reader), and hands out frozen snapshots of governed
#     validation/metric state.
#   - PHI/sensitive prompt guard (js/agents/phi-prompt-guard.js): asserts it
#     reuses the domain-pack sensitive-category classifier for column names,
#     runs an always-on default SSN/MRN/email/long-id value scan even with NO
#     pack active, drops sensitive columns from sample rows without mutating the
#     input, and redacts free text before it can reach the WebLLM path.
# Both modules are pure JS (engine/classifier injected, browser-free), so no
# DuckDB, DOM, or network is needed — plain `node` runs the suite.

name: Open Floor kernel (Gen 45, Batch A)

on:
  workflow_call:

jobs:
  open-floor-kernel:
    name: Open Floor kernel (read-only room + PHI prompt guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:openfloor
