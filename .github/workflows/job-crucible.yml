# ============================================================
# DATAGLOW — CI job: The Crucible (adversarial validator, Batches 1, 2 & 3)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suites behind The Crucible's Batch 1:
#   - test:cruciblecontract — the typed handoff contract
#     (js/validation/crucible-contract.js): buildCleaningResult /
#     buildValidationVerdict never-throw + validation discipline, and
#     fingerprintCleaningResult reusing the provenance SHA-256 primitive. Plain
#     node — no DuckDB, DOM, or network.
#   - test:cruciblepacks — the adversarial pack library
#     (js/validation/crucible-adversarial-packs.js) run against the REAL
#     findFuzzyDuplicates() with its DuckDB backend swapped in via the
#     duckdb-loader-hook, asserting the name-order-swap and SSN-transposition
#     packs currently and correctly FAIL (empirical proof of the two AHIMA gaps
#     NORTH_STAR documented — a real gap, not a regression), plus the value packs
#     against correct/naive stub agents and the never-throw suite runner.
# And the Batch 2 read-only UI view-model suite:
#   - test:crucibleui — the pure, DOM-free view-model builders
#     (js/validation/crucible-ui.js): shouldOfferCrucible / buildPipelineModel /
#     buildAdversarialPackListModel / buildRunLogModel, fed REAL Batch 1 output
#     (buildCleaningResult / buildValidationVerdict / runAdversarialSuite), and
#     the never-throw honest-empty-state discipline. Plain node — no DOM.
# And the Batch 3 proposal-only revert-eligibility suite:
#   - test:reverteligibility — the pure classifier + proposal builder
#     (js/provenance/revert-eligibility.js): classifyRevertEligibility /
#     buildRevertProposal / summarizeRevertProposals, fed REAL blame entries
#     (buildBlameDetail / normalizeBlameEntry from js/provenance/data-blame.js).
#     Asserts DELETE-style + aggregate fixes are permanently not revert-eligible,
#     UPDATE-style only with usable before/after, proposals are inert data (no
#     SQL, no mutation), and the never-throw discipline. Plain node — no DOM.

name: The Crucible (Batches 1, 2 & 3)

on:
  workflow_call:

jobs:
  crucible:
    name: The Crucible (typed handoff contract + adversarial packs + read-only UI + revert proposals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:cruciblecontract
      - run: npm run test:cruciblepacks
      - run: npm run test:crucibleui
      - run: npm run test:reverteligibility
