# ============================================================
# DATAGLOW — CI job: Cross-Table Relational Rules (Truth Network, Batch 1)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind Cross-Table Relational Rules
# (js/validation/cross-table-rules.js): checkCrossTableRule() joining two
# arrays-of-row-objects (or pre-joined pairs) on a key and evaluating the
# date_after (death-date washout) and set_difference (claims-total mismatch)
# rule kinds, plus summarizeCrossTableCheck() and the never-throws edge cases.
# The module is pure JS with no DOM/DuckDB/network, so plain `node` runs the
# suite — same shape as the Room Signaling (Rooms Batch 1) job.

name: Cross-Table Relational Rules (Truth Network B1)

on:
  workflow_call:

jobs:
  cross-table-rules:
    name: Cross-Table Relational Rules (join + date_after/set_difference contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:crosstable
