# ============================================================
# DATAGLOW — CI job: Tauri desktop shell smoke (debug build)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Compiles the Tauri v1 desktop shell in debug mode to prove the Rust side and
# the bundle config stay buildable. This does NOT produce signed/notarized
# installers — it is a "does the shell still compile against the static site"
# gate, nothing more.
#
# WHY ubuntu-22.04 (pinned, not ubuntu-latest): Tauri v1 links against
# webkit2gtk-4.0 (libwebkit2gtk-4.0-dev). That package was dropped from Ubuntu
# 24.04, which ships only the 4.1 series, so ubuntu-latest would fail to install
# the dev headers. 22.04 is the last runner image that carries 4.0.
#
# WHY --debug: a debug build skips the slow release optimizer and installer
# bundling while still exercising the full Rust compile + asset-walk of the
# frontendDist, which is what could realistically break.

name: tauri desktop shell smoke

on:
  workflow_call:

jobs:
  tauri-smoke:
    name: tauri desktop shell smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri v1 system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Tauri desktop shell (debug)
        run: npm run tauri:build:debug
