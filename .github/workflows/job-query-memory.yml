# ============================================================
# DATAGLOW — CI job: Query Memory (Batch 1 + Batch 2)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the Query Memory suite:
#   - test:querymemory — batch 1: the PURE, Node-testable module
#     (js/provenance/query-memory.js) — computeQueryFingerprint's exact-match,
#     context-grounded fingerprint semantics, the JSON-safe (raw-text-free) log
#     entry builder, the seen/count/authors summary, and createQueryMemoryLog's
#     record/lookup/history against an in-memory fake store mirroring the
#     memory-store.js contract (no real IndexedDB needed).
#   - test:querymemoryui — batch 2: the PURE, DOM-free badge view-model
#     (js/provenance/query-memory-ui.js) — buildQueryMemoryBadgeModel's honest
#     "new" vs "seen before" phrasing, singular/plural author+count wording,
#     and never-throws-on-junk behavior. SQL/Python/R wiring itself
#     (recordAndRenderQueryMemory in js/app-shell/main.js) is exercised via the
#     e2e smoke suite, not here — this job stays pure JS, no DuckDB/browser.
# Ships behind the OFF-by-default `queryMemory` flag.

name: Query Memory

on:
  workflow_call:

jobs:
  query-memory:
    name: Query Memory (pure fingerprint + log + badge, batch 1+2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:querymemory
      - run: npm run test:querymemoryui
