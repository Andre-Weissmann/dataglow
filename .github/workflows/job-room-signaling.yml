# ============================================================
# DATAGLOW — CI job: Room Signaling + Room Broadcast (DataGlow Rooms, Batch 1 + 2)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# CONSOLIDATED 2026-07-14 (CI job-count quick patch — see docs/tech-debt-tracker.md
# "CI job-count ceiling" entry): this file used to be two separate reusable-workflow
# jobs (job-room-signaling.yml + job-room-broadcast.yml). GitHub Actions caps a
# single workflow file at 50 `workflow_call`-referenced jobs; main was already at
# the cap, so PR #106/#121 needed one slot freed. These two were picked because
# they are the most similar pair in the file: same batch (DataGlow Rooms), same
# pure-Node-no-browser test shape, same setup steps, adjacent batches (B1/B2) of
# the same feature. No test coverage was removed — both suites still run in full,
# just as two steps of one job instead of two separate jobs. Split back apart if a
# future job-count cleanup (see backlog) makes this unnecessary.
#
# --- Room Signaling (Batch 1) ---
# Runs the pure-logic suite behind DataGlow Rooms' room-code generation and
# peer-discovery/signaling contract (js/rooms/room-signaling.js):
#   - isRoomsSupported() graceful WebRTC capability check (never throws),
#   - generateRoomCode() / normalizeRoomCode() / isValidRoomCode(),
#   - RoomSignalingCoordinator.join()/listPeers()/leave() against an injected
#     fake signaling adapter (mirrors FederatedCoordinator's own test style).
#
# --- Room Broadcast (Batch 2) ---
# Runs the pure-logic suite behind DataGlow Rooms' Object Space broadcast wiring
# (js/rooms/room-broadcast.js):
#   - buildEntryMessage() / buildViewingMessage() wire-message shaping (shape
#     metadata only, never raw rows),
#   - RoomBroadcastCoordinator.broadcastEntry()/broadcastViewing() — sends to
#     peers only when a Room is active, a strict no-op otherwise,
#   - receive() routing + newest-write-wins Object Space application and the
#     read-only "who's viewing" peer→object map,
#   - per-peer / whole-transport degradation (never throws), all against an
#     injected fake data-channel transport.
#
# Both modules are pure JS with dependency-injected adapters (no real WebRTC/
# network exercised in CI), so plain `node` runs both suites — no DuckDB, DOM,
# or browser needed.

name: Room Signaling + Broadcast (Rooms B1+B2)

on:
  workflow_call:

jobs:
  room-signaling-and-broadcast:
    name: Room Signaling + Broadcast (room codes, peer discovery, Object Space broadcast contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomsignaling
      - run: npm run test:roomsbroadcast
