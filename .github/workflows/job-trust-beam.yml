# ============================================================
# DATAGLOW — CI job: Trust Beam (shareable seal link)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Unit-tests the pure serializer (js/provenance/trust-beam.js) that turns an
# existing Verifiable Check Seal into a self-contained, URL-fragment-safe link a
# recipient with zero DataGlow install can re-verify in any browser — pure Node,
# no browser, no DuckDB, no network. It mints a real seal, confirms an
# encode/decode round-trip is byte-for-byte lossless, proves a TAMPERED beam
# payload FAILS the existing verifySeal() (genuine tamper detection), checks
# buildBeamUrl produces a well-formed fragment URL, and guards against any network
# primitive in the module. See test/trust-beam.test.mjs.

name: Trust Beam

on:
  workflow_call:

jobs:
  trust-beam:
    name: Trust Beam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:trustbeam
