# ============================================================
# DATAGLOW — CI job: Export / reporting layer
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Unit-tests the Universal Export Contract (js/export-report.js) and its
# platform delivery adapters (js/export-delivery.js): the pure view-model and
# dependency-free PDF builders, the Excel builder against an injected fake
# SheetJS, the browser/desktop/mobile adapters against a fake window (including
# the Tauri dialog.save + fs.writeBinaryFile native path and its browser
# fallback), and a source guard asserting neither module contains a network
# primitive (DATAGLOW's zero-upload promise). Pure Node — no browser, no
# network, no real SheetJS. See test/export-report.test.mjs.

name: Export / reporting layer

on:
  workflow_call:

jobs:
  export-reporting:
    name: Export / reporting layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:export
