# ============================================================
# DATAGLOW — CI job batch 04 (consolidated)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# CONSOLIDATION NOTE (2026-07-17): GitHub caps a single caller workflow file
# at 50 UNIQUE reusable workflows in its call tree (confirmed via GitHub Docs:
# https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations
# — nesting into intermediate "batch" reusable workflows does NOT free
# headroom, since every workflow in the tree still counts individually).
# The real, GitHub-documented fix is that a single file's `jobs:` block can
# define many named jobs with zero contribution to that 50-workflow limit —
# only `uses:` calls to SEPARATE files count. This file groups several
# previously-separate one-job-per-file reusable workflows into one file with
# multiple jobs, each still running independently in its own runner, with
# IDENTICAL job names/ids and IDENTICAL steps as before (pure structural
# consolidation, zero behavior change). The individual per-job files this
# batch replaces:
#   - job-problem-framer.yml -> job: problem-framer
#   - job-provenance-packet-batch-3.yml -> job: provenance-packet-batch-3
#   - job-provenance-packet.yml -> job: provenance-packet
#   - job-query-memory.yml -> job: query-memory
#   - job-readiness-gate.yml -> job: readiness-gate
#   - job-room-signaling.yml -> job: room-signaling-and-broadcast
#   - job-room-transport-adapter.yml -> job: room-transport-adapter
#   - job-room-ui.yml -> job: room-ui
#   - job-semantic-layer.yml -> job: semantic-layer
#   - job-shipped-bug-regressions.yml -> job: shipped-bug-regressions
#
# To add a NEW job going forward: prefer adding a job block to whichever
# job-ci-batch-*.yml file has spare room, rather than creating a new
# job-<name>.yml + a new `uses:` line in test.yml. See the DataGlow CI
# Architect note in test.yml's header for the standing guardrail.

name: CI batch 04

on:
  workflow_call:

jobs:
  problem-framer:
    name: Problem Framer (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:framer

  provenance-packet-batch-3:
    name: Provenance Packet Batch 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:provpacket

  provenance-packet:
    name: Provenance Packet (Batch 1 + Batch 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:datablame
      - run: npm run test:deidverify
      - run: npm run test:denialprofile
      - run: npm run test:costofbaddata
      - run: npm run test:skillscredential

  query-memory:
    name: Query Memory (pure fingerprint + log + badge, batch 1+2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:querymemory
      - run: npm run test:querymemoryui

  readiness-gate:
    name: AI Readiness Gate (pure scoring + badge model + agent hard-block, batches 1-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:readinessgate
      - run: npm run test:readinessgateui
      - run: npm run test:agentgate

  room-signaling-and-broadcast:
    name: Room Signaling + Broadcast (room codes, peer discovery, Object Space broadcast contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomsignaling
      - run: npm run test:roomsbroadcast

  room-transport-adapter:
    name: Room Transport Adapter (GitHub signaling + WebRTC mesh, faked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomstransportadapter

  room-ui:
    name: Room UI (Room pill + presence badges + live-update toast contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomsui

  semantic-layer:
    name: Semantic / Metrics Layer (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:semanticlayer

  shipped-bug-regressions:
    name: shipped-code bug regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Bug 1: Python bridge 200K truncation is now surfaced (runPython returns
      # a `truncated` descriptor; the pure computeBridgeTruncation drives it).
      - run: npm run test:pytruncation
      # Bug 2: CSV parse-error drops are counted via STORE_REJECTS and reported.
      - run: npm run test:csvrejects
      # Bug 3: the upload UI only advertises formats with working loaders.
      - run: npm run test:uploadformats
      # Bug 4: offline-capability claims match the self-hosted vs CDN split.
      - run: npm run test:offlineclaims
