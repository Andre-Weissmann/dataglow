# ============================================================
# DATAGLOW — CI job: Open Floor Sandbox Twin (Gen 45, Batch B)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the RED-TEAM regression suite for the Open Floor Sandbox Twin
# (js/simulation/sandbox-twin.js). The suite plays the agent-gone-rogue from the
# April 2026 incident and asserts the twin's two guarantees hold:
#   (a) a twin op is INERT until confirmed (an unconfirmed "delete everything"
#       leaves the twin untouched; a confirmed twin wipe is reversible via reset);
#   (b) the REAL dataset is NEVER touched without going through the Agent Action
#       Firewall — every unconfirmed / bypass-flagged / nonce-replayed promote
#       throws AgentActionBlocked and the real-table writer is never called; only
#       a valid per-action human confirmation lets a promote through, exactly once,
#       recording the authorizing identity to the chain of custody.
# It also covers graceful degradation: when the firewall module is unavailable the
# twin comes up disabled and fails closed instead of throwing. Pure Node — no
# browser, no DuckDB, no network. See test/sandbox-twin.test.mjs.

name: Open Floor Sandbox Twin (Gen 45, Batch B)

on:
  workflow_call:

jobs:
  open-floor-sandbox-twin:
    name: "Open Floor Sandbox Twin (red-team: firewall-gated twin + promote)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sandboxtwin
