# ============================================================
# DATAGLOW — CI job: Multi-dialect SQL adapter (Polyglot Workbench, Batch A)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the unit suite for the pure dialect adapter (translateDialectSql):
# per-dialect syntax rewrites (postgres/mysql/bigquery/snowflake/tsql), the
# duckdb no-op passthrough, and the string-literal/comment-protection edge
# cases. Each translated statement is executed against a real DuckDB engine
# (@duckdb/node-api) to prove the output is valid DuckDB SQL. No browser.

name: Dialect Adapter

on:
  workflow_call:

jobs:
  dialect-adapter:
    name: Multi-dialect SQL adapter (Polyglot Workbench Batch A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:dialectadapter
