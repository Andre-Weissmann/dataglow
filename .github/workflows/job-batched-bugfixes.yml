# ============================================================
# DATAGLOW — CI job: batched bug-fix regression suite
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Guards four independent, previously-confirmed bugs, each covered by a
# fail-first regression test:
#   Bug 1 — provenance: registerFileBuffer must not detach the caller's bytes
#           (duckdbBytes hands the engine an independent copy).
#   Bug 2 — Benford's Law: the CORE eligibility gate recognises pure 0/1 flag
#           columns (cause 'binary_flag'), independent of any domain pack.
#   Bug 3 — Narrative Consistency: a correct proportion narrated as a percentage
#           (mean 0.30 -> "30.0%") is accepted, not flagged as a mismatch.
#   Bug 4 — SQL editor: dependency-free syntax highlighter tokens + structured
#           DuckDB error formatting.
#
# The "layers" suite runs against a REAL (native) DuckDB engine via the loader
# hook; the "editor" suite runs under plain Node because it imports the real
# browser duckdb-engine.js module to exercise duckdbBytes (the hook would
# otherwise redirect that import to the native engine).

name: Batched bug-fix regression

on:
  workflow_call:

jobs:
  batched-bugfixes:
    name: Batched bug-fix regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:bugfixes-layers
      - run: npm run test:bugfixes-editor
