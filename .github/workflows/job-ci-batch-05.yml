# ============================================================
# DATAGLOW — CI job batch 05 (consolidated)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# CONSOLIDATION NOTE (2026-07-17): GitHub caps a single caller workflow file
# at 50 UNIQUE reusable workflows in its call tree (confirmed via GitHub Docs:
# https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations
# — nesting into intermediate "batch" reusable workflows does NOT free
# headroom, since every workflow in the tree still counts individually).
# The real, GitHub-documented fix is that a single file's `jobs:` block can
# define many named jobs with zero contribution to that 50-workflow limit —
# only `uses:` calls to SEPARATE files count. This file groups several
# previously-separate one-job-per-file reusable workflows into one file with
# multiple jobs, each still running independently in its own runner, with
# IDENTICAL job names/ids and IDENTICAL steps as before (pure structural
# consolidation, zero behavior change). The individual per-job files this
# batch replaces:
#   - job-source-convergence-ingestion.yml -> job: source-convergence-ingestion
#   - job-source-convergence-ui.yml -> job: source-convergence-ui
#   - job-source-convergence.yml -> job: source-convergence
#   - job-sql-logic.yml -> job: sql-logic
#   - job-synthetic-data-passport.yml -> job: synthetic-data-passport
#   - job-trust-beam.yml -> job: trust-beam
#   - job-verifiable-check-seal.yml -> job: verifiable-check-seal
#
# To add a NEW job going forward: prefer adding a job block to whichever
# job-ci-batch-*.yml file has spare room, rather than creating a new
# job-<name>.yml + a new `uses:` line in test.yml. See the DataGlow CI
# Architect note in test.yml's header for the standing guardrail.
#
# 2026-07-19: added `prompt-eval` (Prompt Eval Harness for Guarded Copilot and
# Query Sentinel, test/prompt-eval/runner.js) here per that guardrail — this
# batch had the most spare headroom of the five. Node built-ins only, no
# `npm ci` needed for this job.

name: CI batch 05

on:
  workflow_call:

jobs:
  source-convergence-ingestion:
    name: Source Convergence ingestion (Excel/API/site adapters + engine-compatibility contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergenceingestion

  source-convergence-ui:
    name: Source Convergence UI (flag gate + view-model builders + click-through)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergenceui

  source-convergence:
    name: Source Convergence (N-way join graph + trust-margin resolution contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergence

  sql-logic:
    name: SQL logic (native DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # SQL Analysis Contract: schema-hallucination detection (including the
      # 2026-07-17 fix for SQL function calls like ROUND/UPPER/ROW_NUMBER
      # being false-positived as hallucinated references), aggregation
      # mismatch detection, and missing-guard-clause detection. Pure Node,
      # no browser/DuckDB needed (see test/analysis-contract.test.mjs) — the
      # live-catalog/real-browser e2e counterpart runs in job-e2e-smoke.yml
      # alongside this repo's other real-Chrome e2e suites.
      - run: npm run test:analysiscontract
      - run: npm run test:sql
      # Cross-Column Logical Consistency Checker: rule detection/firing unit suite.
      - run: npm run test:crosscol
      # Forecast-Based Drift Alerting: Holt's exponential-smoothing math, the
      # min-history gate, trend-aware flagging, and the injected trend-history
      # store wiring that extends Distributional Fingerprint Drift (PR#15).
      - run: npm run test:driftforecast
      # Expected Value Ranges: informational numeric-column trend bands derived
      # from the forecast projections (per-upload trend %, within/outside-range
      # phrasing, numeric-only scope, graceful fallback, no status change).
      - run: npm run test:expectedrange
      # Gen 9 Batch 1: Domain Physics Engine unit suite + provenance attestation verifier.
      - run: npm run test:physics
      - run: npm run test:attestation
      # Upper-Bound Sanity Anchor: logical/definitional bounds detection + runner.
      - run: npm run test:upperbound
      # The Standards Bridge (Gen 33): OMOP/FHIR schema recognition, concept→vital
      # mapping, and the specified cross-column / physiological-plausibility /
      # missingness violations — all routed through the existing layers' bounds.
      - run: npm run test:standards
      # Missingness Detective: MCAR/MAR/MNAR causal-missingness classification.
      - run: npm run test:missingness
      # Fuzzy Duplicate Radar: catch-rate benchmark against a seeded patients
      # dataset (12 known near-duplicate records) + false-positive guard.
      - run: npm run test:fuzzydedup
      # Fuzzy Duplicate Radar — P0 identifier guard (2026-07-15): the radar
      # must never offer a destructive "Merge →" on a unique-identifier column
      # (claim_id, patient_id, etc.) even when digit-permutation IDs score high
      # on pure string similarity — mirrors categorical-consistency.js's own
      # guard below via the shared js/shared/identifier-columns.js helper.
      - run: npm run test:fuzzydedupidguard
      # Clean tab "Scan for Issues" — fuzzy-dedup wiring (P1 fix, 2026-07-15):
      # Scan for Issues must surface a fuzzy_duplicates summary issue when
      # near-duplicate text values are present, not just the standalone Fuzzy
      # Duplicate Radar panel — previously a silent coverage gap.
      - run: npm run test:cleanscanfuzzy
      # Categorical Consistency Engine — P0 identifier guard: unique-ID columns
      # (patient_id, claim_id, and any column matching the business-key naming
      # convention or measured near-unique cardinality) must never be offered a
      # fuzzy "Apply Merge" — proven both by the pure guard functions and by a
      # real DuckDB-backed detectColumnClusters() call, alongside a check that
      # genuine categorical spelling-variant columns are unaffected.
      - run: npm run test:catidguard
      # Predictive Anomaly Scoring: holistic kNN/Gower mixed-type outlier score,
      # feature attribution, feature selection, and the size-guard/sampling path.
      - run: npm run test:predanomaly
      # Self-Learning Validation Rules: labeled-example capture, incremental
      # logistic-regression training, min-examples gating, ranking/explanation,
      # and the opt-in/opt-out/clear persistence contract.
      - run: npm run test:selflearn
      # Unified Signal Layer: the shared in-memory signal store (row/column-keyed
      # register/query/lookups + typed clear), the ranker's per-column verdict
      # tally, anomaly suppression when the ranker has learned a dismissal, and
      # drift-flag enrichment with recent rule changes — all additive/no-op-safe.
      - run: npm run test:signalstore
      # Entropy-Reduction Scan (repo-tooling, not a shipped feature): the pure,
      # read-only golden-principles scanner used by the weekly
      # entropy-reduction-scan workflow. This unit test only keeps the scan
      # SCRIPT honest; it does not run the scan as a merge gate.
      - run: npm run test:entropy
      # Dependency Freshness Ledger (repo-tooling, not a shipped feature): the
      # pure staleness/vulnerability scoring core used by the dependency-freshness
      # job below. This network-free unit test only keeps the SCRIPT honest; the
      # actual registry-backed gate runs in its own job.
      - run: npm run test:deps-freshness-unit
      # Adaptive Layer Prioritization: Beta-Binomial/Laplace per-layer scoring,
      # exponential recency decay, the min-actions reorder gate, permutation-safe
      # reordering (never hides a layer), and opt-in/opt-out/clear persistence.
      - run: npm run test:adaptivepriority
      # Federated Fingerprint Learning (opt-in): pairwise-masking secure
      # aggregation cancellation, DP Gaussian clip+noise, min-cohort gating,
      # FedAvg, gossip peer-selection, GitHub-relay fallback, coordination-file
      # rotation, hash-chained receipts, and graceful degradation — all with
      # network/WebRTC/GitHub adapters stubbed (no real network in CI).
      - run: npm run test:federated
      # Fast, deterministic, browser-free unit suites (Gen 9 Batch 2):
      # ambient-validation worker logic + on-device SLM prompt construction.
      - run: npm run test:ambient
      - run: npm run test:slm
      # In-browser Story model: prompt construction + provider/mode selection +
      # generateStory routing/fallback with the WebLLM engine stubbed (no GPU in CI).
      - run: npm run test:storymodel
      # Security regression: Story Engine escapes user-controlled data (stored XSS).
      - run: npm run test:story-xss
      # Gen 10 Batch 2: Digital Twin perturbation → grading pipeline (native DuckDB)
      # and Ambient Watch-Folder change-detection + validation-pipeline reuse.
      - run: npm run test:twin
      - run: npm run test:watch

  synthetic-data-passport:
    name: Synthetic Data Passport
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:synthpassport

  trust-beam:
    name: Trust Beam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:trustbeam

  verifiable-check-seal:
    name: Verifiable Check Seal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:checkseal

  prompt-eval:
    name: Prompt Eval Harness (Guarded Copilot + Query Sentinel mock regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node test/prompt-eval/runner.js
