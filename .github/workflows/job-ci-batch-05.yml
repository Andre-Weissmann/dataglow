# ============================================================
# DATAGLOW — CI job batch 05 (consolidated)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# CONSOLIDATION NOTE (2026-07-17): GitHub caps a single caller workflow file
# at 50 UNIQUE reusable workflows in its call tree (confirmed via GitHub Docs:
# https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations
# — nesting into intermediate "batch" reusable workflows does NOT free
# headroom, since every workflow in the tree still counts individually).
# The real, GitHub-documented fix is that a single file's `jobs:` block can
# define many named jobs with zero contribution to that 50-workflow limit —
# only `uses:` calls to SEPARATE files count. This file groups several
# previously-separate one-job-per-file reusable workflows into one file with
# multiple jobs, each still running independently in its own runner, with
# IDENTICAL job names/ids and IDENTICAL steps as before (pure structural
# consolidation, zero behavior change). The individual per-job files this
# batch replaces:
#   - job-source-convergence-ingestion.yml -> job: source-convergence-ingestion
#   - job-source-convergence-ui.yml -> job: source-convergence-ui
#   - job-source-convergence.yml -> job: source-convergence
#   - job-sql-logic.yml -> job: sql-logic
#   - job-synthetic-data-passport.yml -> job: synthetic-data-passport
#   - job-trust-beam.yml -> job: trust-beam
#   - job-verifiable-check-seal.yml -> job: verifiable-check-seal
#
# To add a NEW job going forward: prefer adding a job block to whichever
# job-ci-batch-*.yml file has spare room, rather than creating a new
# job-<name>.yml + a new `uses:` line in test.yml. See the DataGlow CI
# Architect note in test.yml's header for the standing guardrail.
#
# 2026-07-19: added `prompt-eval` (Prompt Eval Harness for Guarded Copilot and
# Query Sentinel, test/prompt-eval/runner.js) here per that guardrail — this
# batch had the most spare headroom of the five. Node built-ins only, no
# `npm ci` needed for this job.
# 2026-07-19: added `streaming-validator` (Streaming Validation Mode four-pillar
# micro-batch drift detection, js/streaming/streaming-validator.js).

name: CI batch 05

on:
  workflow_call:

jobs:
  source-convergence-ingestion:
    name: Source Convergence ingestion (Excel/API/site adapters + engine-compatibility contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergenceingestion

  source-convergence-ui:
    name: Source Convergence UI (flag gate + view-model builders + click-through)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergenceui

  source-convergence:
    name: Source Convergence (N-way join graph + trust-margin resolution contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:sourceconvergence

  sql-logic:
    name: SQL logic (native DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:analysiscontract
      - run: npm run test:sql
      - run: npm run test:crosscol
      - run: npm run test:driftforecast
      - run: npm run test:expectedrange
      - run: npm run test:physics
      - run: npm run test:attestation
      - run: npm run test:upperbound
      - run: npm run test:standards
      - run: npm run test:missingness
      - run: npm run test:fuzzydedup
      - run: npm run test:fuzzydedupidguard
      - run: npm run test:cleanscanfuzzy
      - run: npm run test:catidguard
      - run: npm run test:predanomaly
      - run: npm run test:selflearn
      - run: npm run test:signalstore
      - run: npm run test:entropy
      - run: npm run test:deps-freshness-unit
      - run: npm run test:adaptivepriority
      - run: npm run test:federated
      - run: npm run test:ambient
      - run: npm run test:slm
      - run: npm run test:storymodel
      - run: npm run test:story-xss
      - run: npm run test:twin
      - run: npm run test:watch

  synthetic-data-passport:
    name: Synthetic Data Passport
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:synthpassport

  trust-beam:
    name: Trust Beam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:trustbeam

  verifiable-check-seal:
    name: Verifiable Check Seal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:checkseal

  prompt-eval:
    name: Prompt Eval Harness (Guarded Copilot + Query Sentinel mock regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node test/prompt-eval/runner.js

  streaming-validator:
    name: Streaming Validation Mode (four-pillar micro-batch drift detection, pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:streamingvalidator
