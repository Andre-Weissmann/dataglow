# ============================================================
# DATAGLOW — CI job: Governed Synthetic Data Passport (Trust Passport, Batch 4)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Unit-tests the Governed Synthetic Data Passport module
# (js/privacy/synthetic-data-passport.js) — pure Node, no browser, no DuckDB, no
# network. It builds a passport from a REAL seeded Synthetic Twin output,
# asserts the composed Data Nutrition Label carries isSynthetic:true and the
# source-data checks, proves the HONEST-NAMING contract in both directions (a
# real Laplace-DP twin reports formal DP with its ε; a heuristic generator
# reports NO formal guarantee and is never upgraded), seals the passport via
# batch 3 and re-verifies it (including tamper detection), and enforces a
# zero-upload / honest-naming source guard. See
# test/synthetic-data-passport.test.mjs.

name: Synthetic Data Passport

on:
  workflow_call:

jobs:
  synthetic-data-passport:
    name: Synthetic Data Passport
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:synthpassport
