# ============================================================
# DATAGLOW — CI job: shipped-code bug regressions
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Regression tests for four confirmed bugs in shipped code, each written
# test-first (proven to fail before the fix, pass after):
#   • Python bridge silently truncated datasets to 200K rows for pandas.
#   • CSV ingest (IGNORE_ERRORS=TRUE) silently dropped malformed rows.
#   • The upload UI advertised SQLite but rejected .sqlite/.db at runtime.
#   • Offline-capability claims didn't distinguish self-hosted engines from the
#     CDN-on-demand runtimes (Pyodide/WebR/WebLLM).
# All four are fast, deterministic, browser-free node suites.

name: shipped-code bug regressions

on:
  workflow_call:

jobs:
  shipped-bug-regressions:
    name: shipped-code bug regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Bug 1: Python bridge 200K truncation is now surfaced (runPython returns
      # a `truncated` descriptor; the pure computeBridgeTruncation drives it).
      - run: npm run test:pytruncation
      # Bug 2: CSV parse-error drops are counted via STORE_REJECTS and reported.
      - run: npm run test:csvrejects
      # Bug 3: the upload UI only advertises formats with working loaders.
      - run: npm run test:uploadformats
      # Bug 4: offline-capability claims match the self-hosted vs CDN split.
      - run: npm run test:offlineclaims
