# ============================================================
# DATAGLOW — CI job: e2e smoke (real Chrome)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Boots the real app in real Chrome and asserts the DuckDB-WASM engine comes
# alive and the Validate tab populates.
# WHY real Chrome (installed via setup-chrome, not the bundled Playwright
# headless-shell): the WASM + Web Worker + Blob-URL bootstrap that DuckDB-WASM
# relies on can be blocked in stripped headless-sandbox environments. GitHub
# Actions with real Chrome is the authoritative "does it actually work in a
# browser" source of truth — a flaky local headless run is not.

name: e2e smoke (real Chrome)

on:
  workflow_call:

jobs:
  e2e-smoke:
    name: e2e smoke (real Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install real Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      # Point Playwright at the system Chrome installed above rather than
      # downloading its own headless-shell build.
      - name: Run e2e smoke test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e
      # M1 live-catalog regression (2026-07-17): a CREATE TABLE-created table's
      # real columns must be resolved via the live DuckDB catalog and NOT
      # false-flagged as hallucinated references by the SQL Analysis Contract.
      - name: Run analysis-contract e2e test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-analysiscontract
      # Gen 9 Batch 2: ambient-validation warnings + on-device SLM graceful
      # degradation (both engine-independent, so robust in headless CI).
      - name: Run ambient + SLM e2e test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-ambient-slm
      # Gen 10 Batch 2: Watch-Folder (driven via the mock-directory test hook, as
      # showDirectoryPicker needs a user gesture) + Digital Twin live simulation,
      # including a network sniffer asserting watched files never leave the device.
      - name: Run watch-folder + digital-twin e2e test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-watch-twin
      # Regression guard for the cross-origin-isolation load race: on a host that
      # sends no COOP/COEP headers, a fast click during the pre-isolation window
      # (before the one-time SW reload) must be queued + replayed, never dropped.
      - name: Run COI load-race regression test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-coi-race
      # Gen 42: conversational pack-builder UI wiring. Engine-independent (imports
      # the presenter on a served origin and drives it on a detached host div, no
      # DuckDB), so it's robust in headless CI. Asserts the feature stays dark with
      # the flag off and, with it on, the question→confirm→summary→finalize flow.
      - name: Run conversational pack-builder UI test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-packbuilder-ui
      # Gen 43 Part 2: meeting scribe Meeting-tab UI wiring. Same engine-independent
      # detached-host approach (no DuckDB). Asserts the 'meeting' tab stays out of
      # the rendered tab list with the flag off and, with it on, the paste-transcript
      # → analyze → pushback/data-request grouping → action-item resolve flow.
      - name: Run meeting scribe UI test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-meetingscribe-ui
      # Gen 43 Part 3: meeting decision ledger UI wiring. Same engine-independent
      # detached-host approach, with a tiny in-memory fake store standing in for
      # IndexedDB (no real browser storage engine needed in CI). Asserts the
      # ledger stays dark with its own flag off and, with it on, the save →
      # browse → filter-by-chart → export → clear flow.
      - name: Run meeting decision ledger UI test
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:e2e-decisionledger-ui
      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshot
          path: test/e2e-failure.png
          if-no-files-found: ignore
