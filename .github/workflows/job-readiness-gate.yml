# ============================================================
# DATAGLOW — CI job: AI Readiness Gate (batches 1-2 of 4)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the AI Readiness Gate suite:
#   - test:readinessgate — batch 1: the PURE scoring aggregator that composes
#     runAllLayers() OUTPUT + an optional metric-contract status into a single
#     agent-consumability verdict, plus the explainGateReasons() renderer.
#   - test:readinessgateui — batch 2: the PURE badge model builder
#     (buildReadinessBadgeModel) that turns a batch-1 verdict into the badge's
#     label/tone/score/reasons (the DOM presenter itself is left to the browser).
# Pure JS, no DuckDB/browser needed. Agent wiring (batch 3) and MCP exposure
# (batch 4) are deferred to later batches (see NORTH_STAR.md).

name: AI Readiness Gate

on:
  workflow_call:

jobs:
  readiness-gate:
    name: AI Readiness Gate (pure scoring + badge model, batches 1-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:readinessgate
      - run: npm run test:readinessgateui
