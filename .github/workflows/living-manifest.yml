# ============================================================
# DATAGLOW — Living Manifest (public-presence automation)
# ============================================================
# Extends the capability-map drift discipline OUTWARD to the repo's public face.
# On every merge to `main` (and on manual dispatch) it regenerates several
# artifacts from the SAME source of truth the CI drift gate validates
# (capability-map.manifest.json) plus the repo's git history, and keeps a wiki
# backlog honest:
#
#   1. Capability dashboard — rewrites the table between the CAPABILITY_TABLE
#      markers in README.md from the manifest, and commits it back if changed.
#   2. Provenance timeline — regenerates docs/PROVENANCE_TIMELINE.md from git log.
#   3. Wiki-gap detector — opens a "Wiki page needed: <area>" issue for any
#      capability area not yet listed in docs/wiki-coverage.json (idempotent).
#
# This is DOCS/METADATA AUTOMATION ONLY. It never touches runtime app code (js/,
# index.html, css/, sw.js, manifest.webmanifest) — zero product risk.
#
# WHY A SELF-PR (not a direct push): `main` is branch-protected
# (required_pull_request_reviews + enforce_admins), so pushing the regenerated
# docs commit straight to `main` is rejected with GH006 ("Changes must be made
# through a pull request"). Rather than weaken that protection (no bypass actor,
# PAT, deploy key, or App is added on purpose), the bot behaves like any other
# contributor: it pushes the regenerated docs to a fixed, non-protected branch
# (`chore/living-manifest-update`) — pushing to a non-protected branch works with
# the default GITHUB_TOKEN — opens (or reuses) a PR into `main`, and auto-merges
# it. The diff is auto-generated, docs-only, and low-risk, so auto-merge once the
# PR's own checks pass is safe. A fixed branch name (not a random suffix) means
# only one such PR is ever open, avoiding branch/PR pileup.
#
# LOOP GUARD: the commit / PR title carries `[skip ci]`, which GitHub Actions
# honors natively to skip the resulting `push` event when the docs PR lands on
# `main`, so the bot's own change never re-triggers this workflow. The generators
# are also no-ops when their output is unchanged (the timeline ignores its
# volatile "Generated:" line when diffing), so a merge that changes neither the
# manifest nor history produces no commit — and therefore no PR — at all.

name: living-manifest

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Serialize runs so two quick merges can't race on the auto-commit / push.
concurrency:
  group: living-manifest
  cancel-in-progress: false

permissions:
  contents: write        # push regenerated docs to the chore/living-manifest-update branch
  pull-requests: write   # open / update / auto-merge the docs self-PR into protected main
  issues: write          # open wiki-gap backlog issues

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the provenance timeline)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The generator scripts use only Node built-ins + git; no npm install needed.
      - name: Regenerate capability dashboard (README)
        run: npm run docs:dashboard

      - name: Regenerate provenance timeline
        run: npm run docs:provenance

      # Direct `git push` to `main` is rejected by branch protection (GH006), so
      # route the regenerated docs through a self-PR on a fixed branch and
      # auto-merge it. See the header comment for the full rationale.
      - name: Open/update docs self-PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=chore/living-manifest-update
          TITLE="chore: regenerate capability dashboard + provenance timeline [skip ci]"

          git config user.name "dataglow-bot"
          git config user.email "dataglow-bot@users.noreply.github.com"
          git add README.md docs/PROVENANCE_TIMELINE.md

          if git diff --cached --quiet; then
            echo "no doc changes to commit — nothing to PR"
            exit 0
          fi

          git commit -m "$TITLE"

          # Point the fixed branch at this commit and (force-)push it. Force is
          # safe: this branch is a throwaway carrier that only ever holds the
          # latest regenerated docs, and only one PR from it is open at a time.
          git branch -f "$BRANCH" HEAD
          git push --force origin "$BRANCH"

          # Open the PR only if one isn't already open for this branch; otherwise
          # the push above has already updated the existing PR's head.
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated docs refresh from the living-manifest workflow (capability dashboard + provenance timeline), regenerated from capability-map.manifest.json and git history. Docs-only, no runtime/product code. Safe to auto-merge once checks pass."
          else
            echo "PR already open for $BRANCH — head updated by the push above"
          fi

          # Auto-merge once the PR's own required checks pass. Fall back to an
          # immediate squash merge if auto-merge isn't enabled for this repo —
          # a README/docs-only diff carries no meaningful CI risk. Squash keeps
          # the [skip ci] title as the merge-commit subject, so the resulting
          # push to main doesn't re-trigger this workflow (loop guard).
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || gh pr merge "$BRANCH" --squash --delete-branch

      - name: Open wiki-gap issues for undocumented capability areas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run docs:wiki-gap
