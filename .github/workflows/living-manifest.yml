# ============================================================
# DATAGLOW — Living Manifest (public-presence automation)
# ============================================================
# Extends the capability-map drift discipline OUTWARD to the repo's public face.
# On every merge to `main` (and on manual dispatch) it regenerates several
# artifacts from the SAME source of truth the CI drift gate validates
# (capability-map.manifest.json) plus the repo's git history, and keeps a wiki
# backlog honest:
#
#   1. Capability dashboard — rewrites the table between the CAPABILITY_TABLE
#      markers in README.md from the manifest, and commits it back if changed.
#   2. Provenance timeline — regenerates docs/PROVENANCE_TIMELINE.md from git log.
#   3. Wiki-gap detector — opens a "Wiki page needed: <area>" issue for any
#      capability area not yet listed in docs/wiki-coverage.json (idempotent).
#
# This is DOCS/METADATA AUTOMATION ONLY. It never touches runtime app code (js/,
# index.html, css/, sw.js, manifest.webmanifest) — zero product risk.
#
# WHY A SELF-PR (not a direct push): `main` is branch-protected
# (required_pull_request_reviews + enforce_admins), so pushing the regenerated
# docs commit straight to `main` is rejected with GH006 ("Changes must be made
# through a pull request"). Rather than weaken that protection (no bypass actor,
# PAT, deploy key, or App is added on purpose), the bot behaves like any other
# contributor: it pushes the regenerated docs to a fixed, non-protected branch
# (`chore/living-manifest-update`) — pushing to a non-protected branch works with
# the default GITHUB_TOKEN — and opens (or reuses + squash-merges) a PR into
# `main`. A fixed branch name (not a random suffix) means only one such PR is
# ever open, avoiding branch/PR pileup.
#
# KNOWN CONSTRAINT — PR CREATION MAY BE DISABLED: this repo has the Actions
# setting "Allow GitHub Actions to create and approve pull requests" turned OFF
# (`can_approve_pull_request_reviews: false`). While the `permissions:` block
# below already grants the run's GITHUB_TOKEN `pull-requests: write`, that
# per-workflow scope CANNOT override the repo-wide create/approve restriction, so
# `gh pr create` is rejected with:
#   GraphQL: GitHub Actions is not permitted to create or approve pull requests
# We deliberately do NOT flip that repo-wide setting here (it would let every
# workflow open PRs — the opposite of least-privilege) and add no PAT. Instead
# the "land docs" step is FAIL-SOFT: pushing the carrier branch always works, and
# if the PR cannot be auto-opened the step records an actionable warning + job
# summary (a maintainer opens/merges the carrier PR once, or enables the setting)
# and exits green — a stale docs table must never turn `main` red on its own.
# Once a PR from the carrier branch exists (maintainer-opened, or after the
# setting is enabled), every later run reuses and squash-merges it automatically.
#
# LOOP GUARD: the commit / PR title carries `[skip ci]`, which GitHub Actions
# honors natively to skip the resulting `push` event when the docs PR lands on
# `main`, so the bot's own change never re-triggers this workflow. The generators
# are also no-ops when their output is unchanged (the timeline ignores its
# volatile "Generated:" line when diffing), so a merge that changes neither the
# manifest nor history produces no commit — and therefore no PR — at all.

name: living-manifest

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Serialize runs so two quick merges can't race on the auto-commit / push.
concurrency:
  group: living-manifest
  cancel-in-progress: false

permissions:
  contents: write        # push regenerated docs to the chore/living-manifest-update branch
  pull-requests: write   # open / update / auto-merge the docs self-PR into protected main
  issues: write          # open wiki-gap backlog issues

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the provenance timeline)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The generator scripts use only Node built-ins + git; no npm install needed.
      - name: Regenerate capability dashboard (README)
        run: npm run docs:dashboard

      - name: Regenerate provenance timeline
        run: npm run docs:provenance

      # Direct `git push` to `main` is rejected by branch protection (GH006), so
      # route the regenerated docs through a self-PR on a fixed carrier branch and
      # squash-merge it. PR *creation* may be blocked repo-wide (see the header
      # comment), so this step is fail-soft: it never fails the run on the known
      # create/approve restriction, only on genuinely unexpected git/gh errors.
      - name: Land regenerated docs via carrier-branch self-PR (fail-soft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=chore/living-manifest-update
          TITLE="chore: regenerate capability dashboard + provenance timeline [skip ci]"

          git config user.name "Claude"
          git config user.email "claude@users.noreply.github.com"
          git add README.md docs/PROVENANCE_TIMELINE.md

          if git diff --cached --quiet; then
            echo "no doc changes to commit — nothing to land"
            # Nothing to publish. If a carrier branch is lingering with no open
            # PR (e.g. left behind by a past failed run), tidy it up so the repo
            # doesn't accumulate an orphaned chore/ branch.
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1 \
               && [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
              echo "removing stale carrier branch $BRANCH (no open PR, no pending docs)"
              git push origin --delete "$BRANCH" || echo "::warning::could not delete stale $BRANCH"
            fi
            exit 0
          fi

          git commit -m "$TITLE"

          # Point the fixed branch at this commit and (force-)push it. Force is
          # safe: this branch is a throwaway carrier that only ever holds the
          # latest regenerated docs, and only one PR from it is open at a time.
          git branch -f "$BRANCH" HEAD
          git push --force origin "$BRANCH"

          # Reuse an open PR if one exists; the force-push above already updated
          # its head. Otherwise try to open one — but tolerate the repo-wide
          # "Actions may not create pull requests" restriction instead of failing.
          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            if gh pr create \
                 --base main \
                 --head "$BRANCH" \
                 --title "$TITLE" \
                 --body "Automated docs refresh from the living-manifest workflow (capability dashboard + provenance timeline), regenerated from capability-map.manifest.json and git history. Docs-only, no runtime/product code. Safe to squash-merge once checks pass."; then
              PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
            else
              echo "::warning title=living-manifest::Regenerated docs pushed to '$BRANCH' but the docs PR could not be auto-opened (GitHub Actions is not permitted to create pull requests on this repo). A maintainer must open/merge that PR, or enable Settings > Actions > 'Allow GitHub Actions to create and approve pull requests'."
              {
                echo "### Living manifest: docs drift detected but not auto-landed"
                echo ""
                echo "Regenerated docs (capability dashboard + provenance timeline) were pushed to \`$BRANCH\`, but could not be landed automatically because GitHub Actions is not permitted to create pull requests on this repository (\`can_approve_pull_request_reviews: false\`)."
                echo ""
                echo "**To land them, either:**"
                echo "- open a PR from \`$BRANCH\` into \`main\` and squash-merge it (later runs will then keep it updated and auto-merge automatically), or"
                echo "- enable *Settings → Actions → General → Allow GitHub Actions to create and approve pull requests*."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          else
            echo "PR #$PR already open for $BRANCH — head updated by the push above"
          fi

          # A PR exists (reused or freshly opened) — squash-merge it now. Merging
          # is not blocked by the create/approve restriction. Squash keeps the
          # [skip ci] title as the merge-commit subject, so the resulting push to
          # main doesn't re-trigger this workflow (loop guard). Fall back to
          # enabling auto-merge if an immediate merge is momentarily blocked.
          gh pr merge "$PR" --squash --delete-branch \
            || gh pr merge "$PR" --auto --squash --delete-branch

      - name: Open wiki-gap issues for undocumented capability areas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run docs:wiki-gap
