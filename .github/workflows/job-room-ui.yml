# ============================================================
# DATAGLOW — CI job: Room UI (DataGlow Rooms, Batch 3)
# ============================================================
# Reusable workflow (called by .github/workflows/test.yml).
#
# Runs the pure-logic suite behind DataGlow Rooms' topbar UI layer
# (js/rooms/room-ui.js):
#   - peerInitials() / avatarColor() — stable per-peer initials + palette color,
#   - buildRoomPillModel() — unsupported / idle / joined pill states,
#   - buildPresenceModel() — the peer list + Batch-2 who's-viewing snapshot
#     composed into avatar badges (never self, never throws),
#   - buildRemoteEntryToast() / notifyRemoteEntry() — the live-update toast
#     descriptor for an incoming remote Object Space entry (reusing the existing
#     toast() primitive), all with malformed/missing input handled gracefully.
# The tested surface is the pure view-model builders only (the DOM renderer
# renderRoomUi() is left to the browser/e2e path, exactly like glow-orb-ui.js),
# so plain `node` runs the suite — no DuckDB, DOM, or browser needed.

name: Room UI (Rooms B3)

on:
  workflow_call:

jobs:
  room-ui:
    name: Room UI (Room pill + presence badges + live-update toast contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:roomsui
